# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4        # ← v4 fixes Node.js warning

      - name: Set up Python 3.10
        uses: actions/setup-python@v5   # ← v5 fixes Node.js warning
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Validate dataset
        run: |
          test -f data/WA_Fn-UseC_-Telco-Customer-Churn.csv
          head -n 1 data/WA_Fn-UseC_-Telco-Customer-Churn.csv

      - name: Train model
        run: python train.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t churn-api .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name churn-test churn-api
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          docker stop churn-test
